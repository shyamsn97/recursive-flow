<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Side-Scrolling Platformer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body { height: 100%; margin: 0; background: #222; color: #fff; font-family: system-ui, sans-serif; }
    .wrap { display: grid; place-items: center; height: 100%; }
    canvas { border: 2px solid #111; background: #87ceeb; image-rendering: pixelated; }
    .help { position: fixed; bottom: 8px; left: 8px; right: 8px; opacity: 0.85; font-size: 14px; text-align: center; }
    a { color: #ffd700; }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="game" width="800" height="450"></canvas>
  </div>
  <div class="help">
    Move: Arrow keys or A/D — Jump: Space/W/ArrowUp — Reset: R
  </div>
  <script defer src="core.js"></script>
  <script defer src="input.js"></script>
  <script defer src="player.js"></script>
  <script defer src="coin.js"></script>
  <script defer src="enemy.js"></script>
  <script defer src="level.js"></script>
  <script defer src="game.js"></script>
</body>
</html>
